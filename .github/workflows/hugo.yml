name: Deploy Hugo to GitHub Pages

on:
  push:
    branches: ["main", "home-redesign"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Checkout home-redesign branch
        uses: actions/checkout@v4
        with:
          ref: home-redesign
          path: home-redesign-checkout

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "latest"
          extended: false

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build main site
        run: hugo --minify

      - name: Build home-redesign site
        run: hugo --minify --baseURL "https://mwballif.github.io/test/"
        working-directory: home-redesign-checkout

      - name: Copy home-redesign site into output
        run: cp -r home-redesign-checkout/public public/test

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
