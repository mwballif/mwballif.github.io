{{ define "title" }}{{ .Site.Title }}{{ end }}

{{ define "header" }}
  {{ partial "header.html" . }}
{{ end }}

{{ define "main" }}
  <div class="home-content">
    <div class="left-section">
      {{ .Content }}
      <p>Here is my <a href="{{ .Site.Params.cv_url | relURL }}" class="cv-link" target="_blank">Curriculum Vitae</a>.</p>
    </div>
    <div class="right-section">
      <img src="{{ .Site.Params.profile_image | relURL }}" alt="{{ .Site.Title }}" class="profile-photo">
    </div>
  </div>
{{ end }}
